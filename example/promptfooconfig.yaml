description: Student Gradebook Processor eval

providers:
  - id: file://./provider.cjs
    config:
      model: gpt-5.2
      instructions: file://./system_prompt.md
      knowledge_files:
        - ./knowledge/grading_rules.py
      input_files:
        - "{{input_file}}"
      container:
        memory_limit: 4g
        cleanup: on-success
      output_dir: ./eval_output
      timeout_ms: 180000

prompts:
  - "{{user_prompt}}"

tests:
  - vars:
      user_prompt: "Process this gradebook CSV. Calculate averages and assign letter grades."
      input_file: ./test_data/gradebook_simple.csv
    assert:
      - type: contains
        value: "Grades"
      - type: contains
        value: "Statistics"
      - type: javascript
        value: "output.includes('Grades') && output.includes('Statistics')"

description: Student Gradebook Processor - Code Interpreter eval

providers:
  - id: file://./example/provider.js

prompts:
  - "{{user_prompt}}"

tests:
  # Test 1: Simple gradebook (no weights, 10 students)
  - vars:
      user_prompt: "Process this gradebook CSV. Calculate averages and assign letter grades."
      input_file: ./example/test_data/gradebook_simple.csv
    assert:
      # Output file exists and is a valid xlsx
      - type: javascript
        value: |
          const { fileAssert } = require('promptfoo-custom-gpt-tools/assertions');
          const files = context.providerResponse.metadata?.outputFiles ?? [];
          if (files.length === 0) return { pass: false, reason: 'No output files generated' };
          return fileAssert(files[0], {
            exists: true,
            minSize: 1024,
            mimeType: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
          });

      # Has required sheets
      - type: javascript
        value: |
          const { xlsxAssert } = require('promptfoo-custom-gpt-tools/assertions');
          const files = context.providerResponse.metadata?.outputFiles ?? [];
          if (files.length === 0) return { pass: false, reason: 'No output files' };
          return xlsxAssert(files[0], {
            minSheets: 2,
            requiredSheets: ['Grades', 'Statistics'],
          });

      # No error values anywhere
      - type: javascript
        value: |
          const { xlsxAssert } = require('promptfoo-custom-gpt-tools/assertions');
          const files = context.providerResponse.metadata?.outputFiles ?? [];
          if (files.length === 0) return { pass: false, reason: 'No output files' };
          return xlsxAssert(files[0], { noErrors: true });

      # Text output mentions all students were processed
      - type: contains
        value: "10"

  # Test 2: Weighted gradebook (with weights row, 15 students, missing data)
  - vars:
      user_prompt: "Process this gradebook. It has assignment weights in the second row. Calculate weighted averages and letter grades. Handle any missing scores."
      input_file: ./example/test_data/gradebook_weighted.csv
    assert:
      # Output file exists
      - type: javascript
        value: |
          const { fileAssert } = require('promptfoo-custom-gpt-tools/assertions');
          const files = context.providerResponse.metadata?.outputFiles ?? [];
          if (files.length === 0) return { pass: false, reason: 'No output files generated' };
          return fileAssert(files[0], {
            exists: true,
            minSize: 1024,
          });

      # Has required sheets
      - type: javascript
        value: |
          const { xlsxAssert } = require('promptfoo-custom-gpt-tools/assertions');
          const files = context.providerResponse.metadata?.outputFiles ?? [];
          if (files.length === 0) return { pass: false, reason: 'No output files' };
          return xlsxAssert(files[0], {
            minSheets: 2,
            requiredSheets: ['Grades', 'Statistics'],
          });

      # No error values
      - type: javascript
        value: |
          const { xlsxAssert } = require('promptfoo-custom-gpt-tools/assertions');
          const files = context.providerResponse.metadata?.outputFiles ?? [];
          if (files.length === 0) return { pass: false, reason: 'No output files' };
          return xlsxAssert(files[0], { noErrors: true });

      # Text output should mention weighted calculation
      - type: icontains
        value: "weight"

      # Text output should mention missing/incomplete data handling
      - type: javascript
        value: |
          const output = (context.providerResponse.output || '').toLowerCase();
          const mentionsMissing = output.includes('missing') || output.includes('incomplete') || output.includes('empty');
          return {
            pass: mentionsMissing,
            reason: mentionsMissing ? 'Output discusses missing data' : 'Expected mention of missing/incomplete data',
          };

description: Student Gradebook Processor - Code Interpreter eval

providers:
  - id: file://./provider.cjs
    config:
      model: gpt-5.2
      instructions: file://./system_prompt.md
      knowledge_files:
        - ./knowledge/grading_rules.py
      input_files:
        - "{{input_file}}"
      container:
        memory_limit: 4g
        cleanup: on-success
        reuse_by_knowledge_hash: true
      output_dir: ./eval_output
      timeout_ms: 120000
      auth: codex
      codex_home: /tmp/codex-auth-test

prompts:
  - "{{user_prompt}}"

tests:
  - vars:
      user_prompt: "Process this gradebook CSV. Calculate averages and assign letter grades."
      input_file: ./test_data/gradebook_simple.csv
    assert:
      - type: javascript
        value: |
          const { fileAssert } = require('promptfoo-custom-gpt-tools/assertions');
          const files = context.providerResponse?.metadata?.outputFiles ?? [];
          if (files.length === 0) return { pass: false, reason: 'No output files generated' };
          return fileAssert(files[0], { exists: true, minSize: 1024 });
